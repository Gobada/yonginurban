<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>매주 그림 인증</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#ECEFE5; --card:#FFFFFF; --cream:#F8F9F3; --ink:#13261C; --muted:#77857A;
    --line:#E4E7DC; --stamp:#00331A; --stamp-soft:#E6ECE4;
    --good:#2E7D52; --good-soft:#E4EFE7; --warn:#B4442E; --warn-soft:#F5E6E1;
    --shadow:0 2px 10px rgba(0,45,25,.05), 0 12px 34px rgba(0,45,25,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Pretendard","Pretendard Variable",system-ui,-apple-system,sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.5;
    -webkit-font-smoothing:antialiased; padding-bottom:40px;
  }
  .wrap{max-width:640px; margin:0 auto; padding:0 16px}
  a{color:var(--stamp)}
  button{font-family:inherit; cursor:pointer}

  header.top{
    position:sticky; top:0; z-index:20; background:var(--stamp);
    border-bottom:1px solid rgba(0,0,0,0);
  }
  .top-inner{max-width:640px; margin:0 auto; padding:13px 16px; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .brand{font-weight:800; font-size:19px; letter-spacing:-.02em; flex:1; color:var(--cream)}
  .brand small{display:block; font-weight:600; font-size:12px; color:rgba(248,249,243,.6); letter-spacing:0}
  .ghost-btn{
    border:1px solid rgba(248,249,243,.28); background:transparent; color:rgba(248,249,243,.92);
    border-radius:10px; padding:8px 10px; font-size:13px; font-weight:600;
  }
  .ghost-btn.on{color:var(--stamp); border-color:var(--cream); background:var(--cream)}

  #banner{display:none; margin:14px 0 0; padding:12px 14px; border-radius:12px;
    font-size:13px; font-weight:600; background:var(--warn-soft); color:#B23}
  #banner.show{display:block}

  .period{margin:16px 0 4px; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
  .pill{font-size:12.5px; font-weight:700; padding:6px 11px; border-radius:999px;
    background:var(--stamp-soft); color:var(--stamp)}
  .pill.gray{background:#E4E7DC; color:var(--muted)}
  .pill.done{background:var(--good-soft); color:#1E5E3C}

  .hero{padding:34px 0 8px; text-align:center}
  .hero .mark{line-height:1}
  .stamp-mark{display:flex; justify-content:center}
  .stamp-mark img{width:min(140px,41%); height:auto; display:block}
  .hero h1{font-family:"궁서","Gungsuh",GungsuhChe,"Nanum Myeongjo",serif; font-size:34px; font-weight:800; letter-spacing:-.01em; margin:14px 0 6px; color:var(--stamp)}
  .hero p{color:var(--muted); font-size:14px; margin:0 auto; max-width:340px}
  .form-card{background:var(--card); border:1px solid var(--line); border-radius:18px;
    box-shadow:var(--shadow); padding:22px; margin:22px 0}
  label.fl{display:block; font-size:13px; font-weight:700; margin:0 0 6px; color:var(--ink)}
  label.fl span{color:var(--muted); font-weight:500}
  .fld{width:100%; border:1px solid var(--line); border-radius:12px; padding:13px 14px;
    font-size:16px; font-family:inherit; background:#F4F6EE; color:var(--ink); outline:none}
  .fld:focus{border-color:var(--stamp); background:#fff}
  .row2{display:flex; gap:10px; margin-top:14px}
  .row2 .col{flex:1}
  .primary{width:100%; margin-top:18px; border:none; background:var(--stamp); color:var(--cream);
    font-weight:800; font-size:16px; padding:15px; border-radius:13px; letter-spacing:-.01em}
  .primary:active{transform:translateY(1px)}
  .primary.sec{background:var(--card); color:var(--stamp); border:1.5px solid var(--stamp)}
  .primary[disabled]{opacity:.5}
  .hint{font-size:12.5px; color:var(--muted); text-align:center; margin-top:14px}

  .legend{display:flex; gap:14px; align-items:center; margin:10px 0 16px; font-size:12px; color:var(--muted); flex-wrap:wrap}
  .legend .dot{display:inline-flex; align-items:center; gap:5px}
  .swatch{width:16px; height:16px; border-radius:50%; display:inline-block}
  .sw-good{background:var(--good-soft); border:1.5px solid var(--good)}
  .sw-open{background:#fff; border:1.5px dashed var(--stamp)}
  .sw-empty{background:#fff; border:1.5px dashed var(--line)}

  .pcard{background:var(--card); border:1px solid var(--line); border-radius:16px;
    box-shadow:var(--shadow); padding:14px 15px; margin:0 0 12px}
  .pcard.me{border:2px solid var(--stamp); background:linear-gradient(#fff,#F6F9F4)}
  .pcard .phead{display:flex; align-items:center; gap:6px; margin-bottom:12px; flex-wrap:wrap}
  .pname{font-weight:800; font-size:16px; letter-spacing:-.02em}
  .metag{font-size:11px; font-weight:800; color:var(--cream); background:var(--stamp);
    padding:2px 8px; border-radius:999px}
  .count{margin-left:auto; font-size:12.5px; color:var(--muted); font-weight:700}
  .p4tag{font-size:11.5px; color:var(--muted); font-weight:700}
  .adm-edit{border:none; background:var(--stamp-soft); color:var(--stamp);
    font-size:11px; font-weight:800; padding:4px 8px; border-radius:8px}
  .adm-edit.on{background:var(--stamp); color:#fff}
  .adm-info{border:none; background:var(--stamp-soft); color:var(--stamp);
    font-size:11px; font-weight:800; padding:4px 8px; border-radius:8px}
  .adm-x{border:none; background:var(--warn-soft); color:#B23;
    font-size:11px; font-weight:800; padding:4px 8px; border-radius:8px}

  .weeks{display:grid; grid-template-columns:repeat(5,1fr); gap:9px}
  .cell{aspect-ratio:1/1; border-radius:14px; border:2px dashed var(--line);
    background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; overflow:hidden; cursor:default}
  .cell .wn{font-size:13px; font-weight:700; color:var(--muted); position:absolute; top:6px; left:0; right:0; text-align:center}
  .cell.done{border-style:solid; border-color:var(--good); background:var(--good-soft); cursor:pointer}
  .cell.done .ck{color:var(--good); font-size:26px; font-weight:900; margin-top:9px}
  .cell.done .wn{color:#1E5E3C}
  .cell.done img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
  .cell.done .ovl{position:absolute; inset:0; background:rgba(46,125,82,.14)}
  .cell.open{border-color:var(--stamp); border-style:dashed; cursor:pointer; background:var(--stamp-soft)}
  .cell.open .plus{color:var(--stamp); font-size:30px; font-weight:800; margin-top:8px; line-height:1}
  .cell.open .wn{color:var(--stamp)}
  .cell.open.pulse{animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,51,26,0)}50%{box-shadow:0 0 0 4px rgba(0,51,26,.16)}}
  .cell.future{opacity:.45}
  .cell.editable-done{cursor:pointer}
  .cell.editable-done::after{content:"수정"; position:absolute; bottom:5px; left:0; right:0;
    font-size:11px; font-weight:800; color:#1E5E3C; text-align:center}

  .empty-state{text-align:center; color:var(--muted); padding:40px 0; font-size:14px}
  .section-title{font-size:13px; font-weight:800; color:var(--muted); margin:22px 0 10px; letter-spacing:.02em}

  .prow{display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:10px 12px; margin-bottom:8px}
  .prow .pn{font-weight:700; flex:1}
  .prow .p4{font-size:12px; color:var(--muted)}
  .mini{border:none; border-radius:9px; padding:7px 11px; font-size:12.5px; font-weight:800}
  .mini.ok{background:var(--good); color:var(--cream)}
  .mini.no{background:var(--warn-soft); color:#B23}

  .overlay{position:fixed; inset:0; background:rgba(18,32,22,.55); backdrop-filter:blur(3px);
    display:none; align-items:center; justify-content:center; z-index:50; padding:18px}
  .overlay.show{display:flex}
  .modal{background:var(--card); border-radius:18px; width:100%; max-width:420px; padding:22px;
    box-shadow:0 20px 60px rgba(18,50,30,.3); max-height:88vh; overflow:auto}
  .modal h3{margin:0 0 4px; font-size:18px; font-weight:800; letter-spacing:-.02em}
  .modal p.sub{margin:0 0 16px; color:var(--muted); font-size:13px}
  .img-view{width:100%; border-radius:12px; display:block; background:#EDEFE6}
  .img-cap{text-align:center; color:var(--muted); font-size:13px; margin-top:10px}
  .modal-actions{display:flex; gap:10px; margin-top:16px}
  .modal-actions .primary{margin-top:0}
  .admpw-fld{letter-spacing:.15em}
  .drop{border:2px dashed var(--line); border-radius:14px; padding:24px; text-align:center;
    color:var(--muted); font-size:14px; background:#F4F6EE; display:block}
  .drop.has{border-color:var(--good); color:var(--ink)}
  .prev{width:100%; border-radius:12px; margin-top:12px; display:none}
  .busy{display:inline-block; width:15px; height:15px; border:2px solid rgba(255,255,255,.4);
    border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-2px; margin-right:7px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; padding:12px 18px; border-radius:12px; font-size:14px; font-weight:600;
    opacity:0; transition:.25s; z-index:99; pointer-events:none; max-width:90%}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .center-load{text-align:center; padding:60px 0; color:var(--muted)}
  .ver{text-align:center; color:var(--muted); opacity:.6; font-size:11px; font-weight:600;
    letter-spacing:.02em; margin:28px 0 6px}
  .fab{position:fixed; left:50%; bottom:20px; transform:translateX(-50%); z-index:40;
    border:none; background:var(--stamp); color:var(--cream); font-weight:800; font-size:15px;
    padding:14px 28px; border-radius:999px; box-shadow:0 8px 24px rgba(0,45,25,.32)}
  .fab:active{transform:translateX(-50%) translateY(1px)}
  .stat-row{display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid var(--line)}
  .stat-row:last-of-type{border-bottom:none}
  .stat-badge{flex:0 0 auto; min-width:44px; text-align:center; background:var(--stamp); color:var(--cream);
    font-weight:800; font-size:13px; padding:5px 8px; border-radius:9px}
  .stat-badge.zero{background:#E4E7DC; color:var(--muted)}
  .stat-names{font-size:14px; line-height:1.55; padding-top:2px}
  .stat-names b{color:var(--stamp)}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand">매주 그림 인증<small id="hdrsub">불러오는 중…</small></div>
    <button class="ghost-btn" id="trashBtn" style="display:none">🗑️ 휴지통</button>
    <button class="ghost-btn" id="infoBtn" style="display:none">✏️ 정보수정</button>
    <button class="ghost-btn" id="whoBtn" style="display:none"></button>
    <button class="ghost-btn" id="admBtn">관리자</button>
  </div>
</header>

<div class="wrap">
  <div id="banner"></div>

  <section id="loginView">
    <div class="hero">
      <div class="mark stamp-mark">
        <img src="yonginurban_stamp_green.png" alt="Urban Sketch Yongin 도장" />
      </div>
      <h1>어사출도 출석도장 찍기!</h1>
      <p>닉네임과 전화번호 뒷 4자리로 들어오세요.</p>
    </div>
    <div class="form-card">
      <label class="fl" for="nick">닉네임</label>
      <input class="fld" id="nick" placeholder="채팅방에서 쓰는 닉네임" autocomplete="off" />
      <div class="row2">
        <div class="col">
          <label class="fl" for="p4">전화번호 뒷 4자리</span></label>
          <input class="fld" id="p4" inputmode="numeric" maxlength="4" placeholder="예: 1234" autocomplete="off" />
        </div>
      </div>
      <button class="primary" id="loginBtn">들어가기</button>
      <div class="hint">처음이면 등록 요청이 관리자에게 전달돼요.<br>승인되면 인증할 수 있어요.</div>
    </div>
  </section>

  <section id="boardView" style="display:none">
    <div class="period" id="periodRow"></div>
    <div class="legend">
      <span class="dot"><span class="swatch sw-good"></span>인증 완료</span>
      <span class="dot"><span class="swatch sw-open"></span>이번 주 (인증 가능)</span>
      <span class="dot"><span class="swatch sw-empty"></span>미인증</span>
    </div>
    <div id="adminPending"></div>
    <div id="boardList"><div class="center-load">현황 불러오는 중…</div></div>
  </section>

  <div class="ver" id="verTag"></div>
</div>

<div class="overlay" id="ov">
  <div class="modal" id="modalBox"></div>
</div>

<div class="overlay" id="ov2" style="z-index:60">
  <div class="modal" id="confirmBox" style="max-width:360px"></div>
</div>

<button class="fab" id="statBtn" style="display:none">📊 통계</button>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
<!-- HEIC(아이폰/맥 기본 사진 포맷) → JPEG 자동 변환용 -->
<script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>

<script>
/* ==========================================================================
   1) 여기만 채우면 끝!  Firebase 콘솔 > 프로젝트 설정 > 내 앱(웹) 에서 복사
   ========================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyDMzNeq_DINevwWXutqrYXpaBy6dp9Yuos",
  authDomain: "shulook-6de61.firebaseapp.com",
  projectId: "shulook-6de61",
  storageBucket: "shulook-6de61.firebasestorage.app",
  messagingSenderId: "876002839235",
  appId: "1:876002839235:web:7949a0b2fad6da865d3076",
  measurementId: "G-78N3XQ5Z6E"
};

/* 관리자 비밀번호 (원하면 바꿔도 됨) */
const ADMIN_PASSWORD = "1234";

/* 버전 표시 (수정할 때마다 올려주면 배포 반영 확인용) */
const APP_VERSION = "v2026.07.10b";

/* 인증 일정: 매주 화 06:00 ~ 다음 월 18:00 (한국시간), 7/7(화) 시작, 10주 */
const TOTAL_WEEKS = 10;
const KST = 9 * 60 * 60 * 1000;
const WEEK1_START = Date.UTC(2026, 6, 7, 6, 0, 0) - KST;  // 2026-07-07 06:00 KST
const WEEK_MS  = 7 * 24 * 60 * 60 * 1000;
const OPEN_MS  = (6 * 24 + 12) * 60 * 60 * 1000;           // 화06:00 → 월18:00 = 156시간
const MAX_IMG_EDGE = 1280;
const JPEG_QUALITY = 0.75;
/* ========================================================================== */


let db, storage, auth, ready = false;
let me = null;
let isAdmin = false;
let people = [];
let unsub = null;
let adminEditPid = null; // 관리자가 현재 '수정' 모드로 열어둔 참가자 id

function banner(msg){
  const b = document.getElementById('banner');
  if(!msg){ b.classList.remove('show'); return; }
  b.textContent = msg; b.classList.add('show');
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

(async function init(){
  document.getElementById('verTag').textContent = APP_VERSION;
  if(firebaseConfig.apiKey.includes("여기에")){
    banner("⚠️ 아직 Firebase 설정이 안 됐어요. 설명서(README) 보고 index.html 위쪽 firebaseConfig 6줄을 채워주세요.");
    document.getElementById('hdrsub').textContent = "설정 필요";
    return;
  }
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    storage = firebase.storage();
    auth = firebase.auth();
    await auth.signInAnonymously();
    ready = true;
    startListening();
    restoreSession();
  }catch(e){
    console.error(e);
    banner("연결에 실패했어요. 익명 로그인(Authentication > 익명)이 켜져 있는지, 설정값이 맞는지 확인해주세요.");
  }
})();

function startListening(){
  if(unsub) unsub();
  unsub = db.collection('participants').onSnapshot(snap=>{
    people = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    render();
  }, err=>{
    console.error(err);
    banner("데이터를 못 읽었어요. Firestore 보안 규칙이 설명서대로 들어갔는지 확인해주세요.");
  });
}

function weekStart(k){ return WEEK1_START + (k-1)*WEEK_MS; }
function weekEnd(k){ return weekStart(k) + OPEN_MS; }
function weekState(k, now){
  if(now < weekStart(k)) return 'future';
  if(now < weekEnd(k))   return 'open';
  return 'locked';
}
function currentOpenWeek(now){
  for(let k=1;k<=TOTAL_WEEKS;k++) if(weekState(k,now)==='open') return k;
  return null;
}
function fmt(ms){
  const d = new Date(ms + KST);
  const mm = d.getUTCMonth()+1, dd = d.getUTCDate();
  const hh = String(d.getUTCHours()).padStart(2,'0');
  const wd = ['일','월','화','수','목','금','토'][d.getUTCDay()];
  return `${mm}/${dd}(${wd}) ${hh}:00`;
}

function renderNow(){
  const now = Date.now();
  renderPeriod(now);
  if(!me && !isAdmin){ showLogin(); return; }
  if(me){
    const fresh = people.find(p=>p.id===me.id);
    if(fresh){ me = {...me, ...fresh}; }
  }
  document.getElementById('loginView').style.display='none';
  document.getElementById('boardView').style.display='block';
  updateWhoBtn();
  renderAdminPending(now);
  renderBoard(now);
}

function renderPeriod(now){
  const row = document.getElementById('periodRow');
  const sub = document.getElementById('hdrsub');
  const open = currentOpenWeek(now);
  let html = '';
  if(now < weekStart(1)){
    html = `<span class="pill gray">아직 시작 전</span><span class="pill">1주차 오픈: ${fmt(weekStart(1))}</span>`;
    sub.textContent = '곧 시작해요';
  } else if(open){
    html = `<span class="pill">🖍️ ${open}주차 진행 중</span><span class="pill gray">마감: ${fmt(weekEnd(open))}</span>`;
    sub.textContent = `${open}주차 · 마감 ${fmt(weekEnd(open))}`;
  } else if(now >= weekEnd(TOTAL_WEEKS)){
    html = `<span class="pill done">🎉 10주 이벤트 종료</span>`;
    sub.textContent = '종료됨 (그림은 계속 볼 수 있어요)';
  } else {
    let next = 1; for(let k=1;k<=TOTAL_WEEKS;k++){ if(now < weekStart(k)){ next=k; break; } }
    html = `<span class="pill gray">잠깐 쉬는 중</span><span class="pill">${next}주차 오픈: ${fmt(weekStart(next))}</span>`;
    sub.textContent = `${next}주차 오픈 대기`;
  }
  row.innerHTML = html;
}

function showLogin(){
  document.getElementById('loginView').style.display='block';
  document.getElementById('boardView').style.display='none';
  document.getElementById('whoBtn').style.display='none';
}
function updateWhoBtn(){
  const trashBtn = document.getElementById('trashBtn');
  if(isAdmin){
    const n = people.filter(p=>p.status==='trashed').length;
    trashBtn.style.display='inline-block';
    trashBtn.textContent = n>0 ? `🗑️ 휴지통 (${n})` : '🗑️ 휴지통';
  } else {
    trashBtn.style.display='none';
  }
  const infoBtn = document.getElementById('infoBtn');
  if(me && !isAdmin){
    infoBtn.style.display='inline-block';
    infoBtn.onclick = ()=> openEditInfo(me.id);
  } else {
    infoBtn.style.display='none';
  }
  const statBtn = document.getElementById('statBtn');
  if(isAdmin){

function approvedSorted(){
  const list = people.filter(p=>p.status==='approved');
  list.sort((a,b)=>((a.createdAt?.seconds||0)-(b.createdAt?.seconds||0)));
  if(me){
    const i = list.findIndex(p=>p.id===me.id);
    if(i>0){ const [x]=list.splice(i,1); list.unshift(x); }
  }
  return list;
}

function renderBoard(now){
  const box = document.getElementById('boardList');
  const list = isAdmin ? approvedSorted() : (me ? people.filter(p=>p.status==='approved' && p.id===me.id) : []);
  if(!list.length){
    box.innerHTML = isAdmin
      ? `<div class="empty-state">아직 승인된 참가자가 없어요.<br>첫 인증자가 되어보세요! 🎨</div>`
      : `<div class="empty-state">참가자 정보를 찾을 수 없어요.</div>`;
    return;
  }
  box.innerHTML = list.map(p=>{
    const mine = me && p.id===me.id;
    const editing = isAdmin && adminEditPid===p.id;
    const weeks = p.weeks || {};
    const doneCount = Object.keys(weeks).length;
    let cells = '';
    for(let k=1;k<=TOTAL_WEEKS;k++){
      const st = weekState(k, now);
      const cert = weeks[String(k)];
      if(cert){
        const editable = (mine && st==='open') || editing;
        cells += `<div class="cell done ${editable?'editable-done':''}"
                       data-act="view" data-pid="${p.id}" data-week="${k}">
                    <span class="wn">${k}주</span><span class="ck">✓</span></div>`;
      } else if(mine && st==='open'){
        cells += `<div class="cell open pulse" data-act="upload" data-pid="${p.id}" data-week="${k}">
                    <span class="wn">${k}주</span><span class="plus">+</span></div>`;
      } else if(editing && st!=='future'){
        cells += `<div class="cell open" data-act="upload" data-pid="${p.id}" data-week="${k}">
                    <span class="wn">${k}주</span><span class="plus">+</span></div>`;
      } else {
        cells += `<div class="cell ${st==='future'?'future':''}"><span class="wn">${k}주</span></div>`;
      }
    }
    const admCtl = isAdmin
      ? (editing
          ? `<button class="adm-edit on" data-act="edtoggle" data-pid="${p.id}">완료</button><button class="adm-info" data-act="editinfo" data-pid="${p.id}">정보수정</button><button class="adm-x" data-act="delp" data-pid="${p.id}">참가자삭제</button>`
          : `<button class="adm-edit" data-act="edtoggle" data-pid="${p.id}">수정</button>`)
      : '';
    return `<div class="pcard ${mine?'me':''}">
      <div class="phead">
        <span class="pname">${esc(p.nickname)}</span>
        ${isAdmin?`<span class="p4tag">···${esc(p.last4||'')}</span>`:''}
        ${mine?'<span class="metag">나</span>':''}
        <span class="count">${doneCount}/${TOTAL_WEEKS}주 인증</span>
        ${admCtl}
      </div>
      <div class="weeks">${cells}</div>
    </div>`;
  }).join('');
  // 클릭은 boardList에 위임(아래 1회 등록) — 매 렌더마다 핸들러를 다시 붙이지 않음
}

/* 보드 클릭 이벤트 위임: 카드/셀이 수백 개여도 리스너는 1개만 유지 */
document.getElementById('boardList').addEventListener('click', (e)=>{
  const cell = e.target.closest('.cell[data-act]');
  if(cell){
    const act=cell.dataset.act, pid=cell.dataset.pid, wk=+cell.dataset.week;
    if(act==='view') openImage(pid,wk);
    else if(act==='upload'||act==='edit') openUpload(pid,wk);
    return;
  }
  const btn = e.target.closest('[data-act]');

  const pid=btn.dataset.pid, act=btn.dataset.act;
  if(act==='edtoggle'){ adminEditPid = (adminEditPid===pid) ? null : pid; render(); }
  else if(act==='editinfo'){ openEditInfo(pid); }
  else if(act==='delp'){ deleteParticipant(pid); }
});

async function login(){
  if(!ready){ toast('연결 중이에요, 잠깐만요!'); return; }
  const nickname = document.getElementById('nick').value.trim();
  const last4 = document.getElementById('p4').value.trim();
  if(!nickname){ toast('닉네임을 입력해주세요'); return; }
  if(!/^\d{4}$/.test(last4)){ toast('전화번호 뒷 4자리(숫자)를 정확히 입력해주세요'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent='확인 중…';
  try{
    const q = await db.collection('participants').where('nickname','==',nickname).limit(1).get();
    if(q.empty){
      btn.disabled=false; btn.textContent='들어가기';
      askRegister(nickname, last4); return;
    }
    const doc = q.docs[0]; const p = doc.data();
    if((p.last4||'') !== last4){ toast('전화번호 뒷자리가 안 맞아요 🥲'); btn.disabled=false; btn.textContent='들어가기'; return; }
    if(p.status==='pending'){ toast('아직 승인 대기 중이에요. 관리자 승인 후 인증할 수 있어요!'); btn.disabled=false; btn.textContent='들어가기'; return; }
    if(p.status==='rejected'){ toast('등록이 거절된 닉네임이에요. 관리자에게 문의해주세요.'); btn.disabled=false; btn.textContent='들어가기'; return; }
    me = { id:doc.id, nickname:p.nickname, last4 };
    sessionStorage.setItem('me', JSON.stringify(me));
    btn.disabled=false; btn.textContent='들어가기';
    render(); toast(`${p.nickname}님, 어서오세요!`);
  }catch(e){
    console.error(e); toast('오류가 났어요. 잠시 후 다시 시도해주세요.');
    btn.disabled=false; btn.textContent='들어가기';
  }
}

let pendingBlob = null;
function openUpload(pid, week){
  const box = document.getElementById('modalBox');
  const p = people.find(x=>x.id===pid);
  const has = p && p.weeks && p.weeks[String(week)];
  box.innerHTML = `
    <h3>${week}주차 ${has?'그림 수정':'그림 인증'}</h3>
    <p class="sub">${esc(p.nickname)} · 사진을 고르고 인증 버튼을 눌러주세요. 자동으로 압축해서 올려드려요.</p>
    <div class="drop" id="drop">📷 사진 선택하기</div>
    <input type="file" accept="image/*" id="file" style="display:none" />
    <img class="prev" id="prev" />
    <div class="modal-actions">
      <button class="primary sec" id="upCancel">취소</button>
      <button class="primary" id="upOk" disabled>인증하기</button>
    </div>`;
  showOverlay();
  pendingBlob = null;
  const fileEl = document.getElementById('file');
  const drop = document.getElementById('drop');
  const prev = document.getElementById('prev');
  const okB = document.getElementById('upOk');
  drop.onclick = ()=> fileEl.click();
  fileEl.onchange = async ()=>{
    const f = fileEl.files[0]; if(!f) return;
    const nm = (f.name||'').toLowerCase();
    const heic = /image\/hei[cf]/i.test(f.type) || /\.(heic|heif)$/i.test(nm);
    drop.classList.remove('has');
    drop.textContent = heic ? '📷 HEIC 변환 중… (몇 초 걸려요)' : '압축 중…';
    okB.disabled = true;
    try{
      pendingBlob = await compress(f);
      if(prev.src && prev.src.startsWith('blob:')) URL.revokeObjectURL(prev.src);
      prev.src = URL.createObjectURL(pendingBlob); prev.style.display='block';
      drop.textContent='✅ 사진 준비됨 (다시 누르면 변경)'; drop.classList.add('has');
      okB.disabled=false;
    }catch(e){
      console.error(e);
      prev.style.display='none';
      if(e && e.message==='HEIC-LIB-MISSING'){
        toast('HEIC 변환 모듈을 못 불러왔어요. 인터넷 확인 후 다시 시도해주세요.');
      } else {
        toast('이미지를 못 읽었어요. 다른 파일로 해볼까요?');
      }
      drop.textContent='📷 사진 선택하기';
    }
  };
  document.getElementById('upCancel').onclick = hideOverlay;
  okB.onclick = ()=> doUpload(pid, week, okB);
}

async function doUpload(pid, week, btn){
  if(!pendingBlob){ toast('사진을 먼저 골라주세요'); return; }
  btn.disabled=true; btn.innerHTML='<span class="busy"></span>올리는 중';
  try{
    const p = people.find(x=>x.id===pid);
    const oldPath = p?.weeks?.[String(week)]?.path;
    const path = `certs/${pid}/w${week}_${Date.now()}.jpg`;
    const refS = storage.ref(path);
    await refS.put(pendingBlob, {contentType:'image/jpeg'});
    const url = await refS.getDownloadURL();
    await db.collection('participants').doc(pid).update({
      [`weeks.${week}`]: { url, path, updatedAt: Date.now() }
    });
    if(oldPath && oldPath!==path){ storage.ref(oldPath).delete().catch(()=>{}); }
    hideOverlay(); toast(`${week}주차 인증 완료! 🎉`);
  }catch(e){
    console.error(e); toast('업로드 실패. Storage 규칙/용량을 확인해주세요.');
    btn.disabled=false; btn.textContent='인증하기';
  }
}

function openImage(pid, week){

  const adminEditing = isAdmin && adminEditPid===pid;

  const box = document.getElementById('modalBox');

    <h3>${esc(p.nickname)} · ${week}주차</h3>

async function deleteCert(pid, week){
  const ok = await confirmDialog(`${week}주차 인증을 삭제할까요?`, {okText:'삭제', danger:true});
  if(!ok) return;
  try{
    const p = people.find(x=>x.id===pid);
    const path = p?.weeks?.[String(week)]?.path;
    await db.collection('participants').doc(pid).update({
      [`weeks.${week}`]: firebase.firestore.FieldValue.delete()
    });
    if(path) storage.ref(path).delete().catch(()=>{});
    hideOverlay(); toast('삭제했어요');
  }catch(e){ console.error(e); toast('삭제 실패'); }
}

async function deleteParticipant(pid){
  const p = people.find(x=>x.id===pid);
  const ok = await confirmDialog('인증 기록은 유지되고, 나중에 복구할 수 있어요.', {title:`"${p?.nickname}" 휴지통으로`, okText:'휴지통으로'});

    toast('휴지통으로 옮겼어요 🗑️');

async function purgeParticipant(pid){
  const p = people.find(x=>x.id===pid);
  const ok = await confirmDialog('삭제하면 복구할 수 없습니다. 삭제할까요?', {title:`"${p?.nickname}" 영구 삭제`, okText:'삭제', danger:true});
  if(!ok) return;
  try{
    if(p?.weeks) for(const k in p.weeks){ if(p.weeks[k].path) storage.ref(p.weeks[k].path).delete().catch(()=>{}); }
    await db.collection('participants').doc(pid).delete();
    toast('영구 삭제했어요');
    openTrash();
  }catch(e){ console.error(e); toast('삭제 실패'); }
}

async function restoreParticipant(pid){
  try{
    const p = people.find(x=>x.id===pid);
    await db.collection('participants').doc(pid).update({
      status: p?.prevStatus || 'approved',
      prevStatus: firebase.firestore.FieldValue.delete(),
      trashedAt: firebase.firestore.FieldValue.delete()
    });
    toast('복구했어요 ✅');
    openTrash();
  }catch(e){ console.error(e); toast('복구 실패'); }
}
document.getElementById('trashBtn').onclick = openTrash;

function openStats(){
  const box = document.getElementById('modalBox');
  const approved = people.filter(p=>p.status==='approved');
  const groups = {}; // 인증횟수 -> [닉네임]
  approved.forEach(p=>{
    const c = Object.keys(p.weeks||{}).length;
    (groups[c] = groups[c] || []).push(p.nickname);
  });
  const counts = Object.keys(groups).map(Number).sort((a,b)=>b-a);
  let rows;
  if(!approved.length){
    rows = `<div class="empty-state">승인된 참가자가 없어요.</div>`;
  } else {
    rows = counts.map(c=>{
      const names = groups[c].sort((a,b)=>a.localeCompare(b,'ko'));
      return `<div class="stat-row">
        <div class="stat-badge ${c>0?'':'zero'}">${c}회</div>
        <div class="stat-names"><b>${names.length}명</b> · ${names.map(esc).join(', ')}</div>
      </div>`;
    }).join('');
  }
  box.innerHTML = `
    <h3>📊 인증 통계</h3>
    <p class="sub">인증 횟수가 많은 순이에요. (전체 ${approved.length}명 · 총 ${TOTAL_WEEKS}주)</p>
    ${rows}
    <div class="modal-actions"><button class="primary sec" id="stClose">닫기</button></div>`;
  showOverlay();
  document.getElementById('stClose').onclick = hideOverlay;
}
document.getElementById('statBtn').onclick = openStats;

/* HEIC(아이폰/맥 기본 사진 포맷)면 JPEG로 먼저 변환. 아니면 원본 그대로 반환 */
async function toDecodable(file){
  const name = (file.name || '').toLowerCase();
  const isHeic = /image\/hei[cf]/i.test(file.type) || /\.(heic|heif)$/i.test(name);
  if(!isHeic) return file;
  if(typeof heic2any !== 'function'){
    throw new Error('HEIC-LIB-MISSING');
  }
  const out = await heic2any({ blob:file, toType:'image/jpeg', quality:0.9 });
  return Array.isArray(out) ? out[0] : out;
}

async function compress(file){
  file = await toDecodable(file);
  let bitmap;
  try{ bitmap = await createImageBitmap(file, {imageOrientation:'from-image'}); }
  catch(_){
    const url = URL.createObjectURL(file);
    bitmap = await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=url; });
  }
  let w = bitmap.width, h = bitmap.height;
  const scale = Math.min(1, MAX_IMG_EDGE / Math.max(w,h));
  w = Math.round(w*scale); h = Math.round(h*scale);
  const c = document.createElement('canvas'); c.width=w; c.height=h;
  c.getContext('2d').drawImage(bitmap, 0, 0, w, h);
  return await new Promise(res=> c.toBlob(res, 'image/jpeg', JPEG_QUALITY));
}
function esc(s){ return String(s??'').replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function showOverlay(){ document.getElementById('ov').classList.add('show'); }
function hideOverlay(){
  document.getElementById('ov').classList.remove('show'); pendingBlob=null;
  const prev = document.getElementById('prev');
  if(prev && prev.src && prev.src.startsWith('blob:')){ URL.revokeObjectURL(prev.src); prev.removeAttribute('src'); }
}
document.getElementById('ov').addEventListener('click', e=>{ if(e.target.id==='ov') hideOverlay(); });

/* 스택 가능한 커스텀 확인 팝업 (네이티브 confirm 대체) */
function confirmDialog(message, {title='확인', okText='확인', danger=false}={}){
  return new Promise(resolve=>{
    const ov2 = document.getElementById('ov2');
    document.getElementById('confirmBox').innerHTML = `
      <h3>${esc(title)}</h3>
      <p class="sub" style="margin-bottom:2px">${esc(message)}</p>
      <div class="modal-actions">
        <button class="primary sec" id="cfCancel">취소</button>
        <button class="primary" id="cfOk"${danger?' style="background:var(--warn)"':''}>${esc(okText)}</button>
      </div>`;
    ov2.classList.add('show');
    const close = (val)=>{ ov2.classList.remove('show'); ov2.onclick=null; resolve(val); };
    document.getElementById('cfCancel').onclick = ()=>close(false);
    document.getElementById('cfOk').onclick = ()=>close(true);
    ov2.onclick = (e)=>{ if(e.target===ov2) close(false); };
  });
}

/* render 코얼레싱: 짧은 시간 내 여러 번 호출돼도 프레임당 1회만 실제 렌더 */
let _renderScheduled = false;
function render(){
  if(_renderScheduled) return;
  _renderScheduled = true;
  requestAnimationFrame(()=>{ _renderScheduled = false; renderNow(); });
}

/* 1분마다 주차 상태가 실제로 바뀔 때만 다시 그림 (불필요한 전체 리렌더 방지) */
function weekSig(now){ let s=''; for(let k=1;k<=TOTAL_WEEKS;k++) s+=weekState(k,now)[0]; return s; }
let _lastWeekSig = null;
setInterval(()=>{
  const sig = weekSig(Date.now());
  if(_lastWeekSig===null){ _lastWeekSig = sig; return; }
  if(sig!==_lastWeekSig){ _lastWeekSig = sig; render(); }
}, 60*1000);
</script>
